name: Build KytyPS5 (Windows x64)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Prepare Vulkan SDK (Headers only)
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: 1.3.296.0
          vulkan-components: Vulkan-Headers
          vulkan-use-cache: true

      # Обходим баг сборки Vulkan-Loader, скопировав vulkan-1.lib из Windows SDK
      - name: Provide vulkan-1.lib from Windows SDK
        run: |
          $sdkLibPath = Join-Path $env:WindowsSdkDir "Lib\$($env:WindowsSDKVersion.TrimEnd('\'))\um\x64\vulkan-1.lib"
          New-Item -ItemType Directory -Force -Path "$env:VULKAN_SDK\Lib"
          Copy-Item $sdkLibPath "$env:VULKAN_SDK\Lib\vulkan-1.lib"
          Write-Host "Copied vulkan-1.lib to $env:VULKAN_SDK\Lib\vulkan-1.lib"
        shell: pwsh

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'

      - name: Configure CMake
        run: |
          cmake -S src -B _Build/windows -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"
        shell: pwsh

      - name: Build Launcher
        run: cmake --build _Build/windows --target launcher
        shell: pwsh

      - name: Stage Installation
        run: cmake --install _Build/windows --prefix _Build/windows/install
        shell: pwsh

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KytyPS5-windows-x64
          path: _Build/windows/install/
          if-no-files-found: error
