name: Build KytyPS5 (Windows x64)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Prepare Vulkan SDK (Headers only)
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: 1.3.296.0
          vulkan-components: Vulkan-Headers
          vulkan-use-cache: true

      # Генерируем vulkan-1.lib из системного vulkan-1.dll, чтобы CMake мог найти библиотеку
      - name: Generate vulkan-1.lib from system DLL
        run: |
          $dllPath = "C:\Windows\System32\vulkan-1.dll"
          $defPath = "vulkan.def"
          $libDir = "$env:VULKAN_SDK\Lib"
          $libPath = "$libDir\vulkan-1.lib"

          Write-Host "Generating vulkan-1.lib from $dllPath..."
          New-Item -ItemType Directory -Force -Path $libDir

          # Извлекаем экспортируемые функции из DLL
          $output = & dumpbin /exports $dllPath
          $exports = $output | Select-String -Pattern "^\s+\d+\s+[0-9A-Fa-f]+\s+(\S+)" | ForEach-Object { $_.Matches.Groups[1].Value }

          # Создаем .def файл
          Add-Content -Path $defPath -Value "LIBRARY vulkan-1.dll"
          Add-Content -Path $defPath -Value "EXPORTS"
          foreach ($exp in $exports) {
            Add-Content -Path $defPath -Value $exp
          }

          # Генерируем .lib
          & lib /def:$defPath /out:$libPath /machine:x64
          Write-Host "Generated $libPath successfully."
        shell: pwsh

      # Копируем все заголовочные файлы из сабмодуля, чтобы гарантировать наличие vk_enum_string_helper.h и других
      - name: Ensure all Vulkan headers are present
        run: |
          Write-Host "Copying headers from submodule to VULKAN_SDK..."
          Copy-Item -Path "3rdparty\Vulkan-Headers\include\vulkan\*" -Destination "$env:VULKAN_SDK\include\vulkan" -Recurse -Force
          Write-Host "Headers copied successfully."
        shell: pwsh

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'

      - name: Configure CMake
        run: |
          cmake -S src -B _Build/windows -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"
        shell: pwsh

      - name: Build Launcher
        run: cmake --build _Build/windows --target launcher
        shell: pwsh

      - name: Stage Installation
        run: cmake --install _Build/windows --prefix _Build/windows/install
        shell: pwsh

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KytyPS5-windows-x64
          path: _Build/windows/install/
          if-no-files-found: error
