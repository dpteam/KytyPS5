name: Build KytyPS5 (Windows x64)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Тихая установка официального Vulkan SDK без зависания
      - name: Install Vulkan SDK
        run: |
          $url = "https://sdk.lunarg.com/sdk/download/1.3.296.0/windows/VulkanSDK-1.3.296.0-Installer.exe"
          $installerPath = "$env:RUNNER_TEMP\vulkan-installer.exe"

          Write-Host "Downloading Vulkan SDK (this may take a couple of minutes)..."
          (New-Object System.Net.WebClient).DownloadFile($url, $installerPath)

          Write-Host "Launching installer in detached mode..."
          # Не используем -Wait, чтобы избежать зависания QtIFW
          $process = Start-Process -FilePath $installerPath -ArgumentList "--accept-licenses --default --root C:\VulkanSDK --quiet" -PassThru

          # Ждем появления файла vulkan-1.lib
          $timeout = 600  # 10 минут максимального ожидания
          $elapsed = 0
          $targetLib = "C:\VulkanSDK\Lib\vulkan-1.lib"

          while (-not (Test-Path $targetLib) -and $elapsed -lt $timeout) {
            Start-Sleep -Seconds 5
            $elapsed += 5
            Write-Host "Waiting for Vulkan SDK installation... ($elapsed s elapsed)"
          }

          if (-not (Test-Path $targetLib)) {
            Write-Error "Vulkan SDK installation timed out or failed."
            exit 1
          }

          Write-Host "Vulkan SDK installed successfully."
          echo "VULKAN_SDK=C:\VulkanSDK" >> $env:GITHUB_ENV
          echo "C:\VulkanSDK\Bin" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'

      - name: Configure CMake
        run: |
          cmake -S src -B _Build/windows -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"
        shell: pwsh

      - name: Build Launcher
        run: cmake --build _Build/windows --target launcher
        shell: pwsh

      - name: Stage Installation
        run: cmake --install _Build/windows --prefix _Build/windows/install
        shell: pwsh

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KytyPS5-windows-x64
          path: _Build/windows/install/
          if-no-files-found: error
