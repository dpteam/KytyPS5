name: Build KytyPS5 (Windows x64)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Скачиваем и тихо устанавливаем официальный Vulkan SDK (включая vulkan-1.lib)
      - name: Install Vulkan SDK
        run: |
          $url = "https://sdk.lunarg.com/sdk/download/1.3.296.0/windows/VulkanSDK-1.3.296.0-Installer.exe"
          Write-Host "Downloading Vulkan SDK..."
          Invoke-WebRequest -Uri $url -OutFile vulkan-installer.exe
          Write-Host "Installing Vulkan SDK silently..."
          Start-Process -FilePath ".\vulkan-installer.exe" -ArgumentList "--accept-licenses --default --root C:\VulkanSDK --quiet" -Wait
          Write-Host "Setting VULKAN_SDK environment variable..."
          echo "VULKAN_SDK=C:\VulkanSDK" >> $env:GITHUB_ENV
          echo "C:\VulkanSDK\Bin" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'

      - name: Configure CMake
        run: |
          cmake -S src -B _Build/windows -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"
        shell: pwsh

      - name: Build Launcher
        run: cmake --build _Build/windows --target launcher
        shell: pwsh

      - name: Stage Installation
        run: cmake --install _Build/windows --prefix _Build/windows/install
        shell: pwsh

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KytyPS5-windows-x64
          path: _Build/windows/install/
          if-no-files-found: error
